<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Responsive layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-slate-100 dark:bg-slate-950">
    <div class="w-120 mx-auto mt-20 group p-8 bg-white hover:bg-indigo-300 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-lg shadow-md border-2 border-gray-200 dark:border-slate-700">
      <h3 class="text-gray-900 dark:text-slate-100 group-hover:text-white">New Movie</h3>
      <p class="text-gray-500 dark:text-slate-300 group-hover:text-white">Lorem ipsum dolor sit amet. Cum quod tempora aut totam.</p>
      <a href="#" class="mt-10 inline-block px-40 py-3 bg-indigo-600 dark:bg-indigo-500 text-white font-semibold rounded-md shadow hover:bg-indigo-700 dark:hover:bg-indigo-400 transition-colors duration-300">Click Me</a>
    </div>
  </body>
</html>
