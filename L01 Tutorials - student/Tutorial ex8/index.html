<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Responsive layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-gray-100">
    <section class="max-w-5xl mx-auto p-6 flex flex-col gap-6 md:flex-row md:items-center">
      <div class="md:w-1/2">
        <img src="https://picsum.photos/800/800" class="w-full h-72 object-cover rounded-lg" alt="Sample fox image"/>
      </div>
      <div class="md:w-1/2">
        <h2 class="text-2xl font-bold text-gray-900">This is a pretty awesome heading</h2>
        <p class="mt-3 text-gray-700">
          Lorem, ipsum dolor sit amet consectetur adipisicing elit. Fugiat
          dolore iure ab veniam fugit perspiciatis dicta sapiente, eaque, velit
          cupiditate consequuntur dolorum nobis vel. Consequatur voluptas
          commodi omnis totam vero.
        </p>
        <a href="#" class="mt-4 inline-block px-6 py-2 bg-indigo-600 text-white rounded-md shadow hover:bg-indigo-700">Let's Go!</a>
      </div>
    </section>
  </body>
</html>
