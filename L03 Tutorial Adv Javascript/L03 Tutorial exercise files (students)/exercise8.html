<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GET: Display All Posts</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 font-sans">
  <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md space-y-4">
    <h1 class="text-2xl font-bold text-blue-700">Exercise – GET: Display All Posts</h1>

    <ul id="postList" class="list-disc pl-6 text-gray-800"></ul>

    <script>
      fetch('https://jsonplaceholder.typicode.com/posts?_limit=10')
        .then(response => response.json())
        .then(posts => {
          const list = document.getElementById('postList');
          posts.forEach(post => {
            const li = document.createElement('li');
            li.textContent = post.title;
            list.appendChild(li);
          });
        });
    </script>
  </div>
</body>
</html>
