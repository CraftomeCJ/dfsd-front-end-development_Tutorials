<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Async/Await Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 font-sans">
  <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow space-y-4">
    <h1 class="text-xl font-bold text-green-700">Fetch User and Posts – Async/Await</h1>

    <input id="userIdAsync" type="text" placeholder="Enter User ID" class="border p-2 w-full rounded" />
    <button onclick="getUserPosts()" class="bg-green-500 text-white px-4 py-2 mt-2 rounded">Get Posts</button>

    <div id="outputAsync" class="mt-4 text-gray-800 space-y-2"></div>

    <script>
      async function getUserPosts() {
        const userId = document.getElementById('userIdAsync').value;
        const output = document.getElementById('outputAsync');
        output.innerHTML = '';

        try {
          const userRes = await fetch('https://jsonplaceholder.typicode.com/users/' + userId);
          if (!userRes.ok) throw new Error('Unable to fetch user response: ' + userRes.status);
          const user = await userRes.json();

          const postsRes = await fetch('https://jsonplaceholder.typicode.com/posts?userId=' + userId);
          if (!postsRes.ok) throw new Error('Unable to fetch posts response: ' + postsRes.status);
          const posts = await postsRes.json();

          const heading = document.createElement('p');
          heading.className = 'font-bold';
          heading.textContent = user.name + "'s Posts:";
          output.appendChild(heading);

          posts.forEach(post => {
            const p = document.createElement('p');
            p.textContent = post.title;
            output.appendChild(p);
          });
        } catch (err) {
          output.textContent = "Error fetching data.' + Error: " + err.message;
        }
      }
    </script>
  </div>
</body>
</html>
