<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PUT: Update a Post</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 font-sans">
  <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md space-y-4">
    <h1 class="text-2xl font-bold text-blue-700">Exercise – PUT: Update a Post</h1>

    <input id="postId" type="number" placeholder="Post ID" class="block border p-2 w-full rounded" />
    <textarea id="updateBody" placeholder="New Content" class="block border p-2 w-full rounded mt-2"></textarea>
    <button onclick="updatePost()" class="bg-yellow-500 text-white px-4 py-2 rounded mt-2">Update Post</button>

    <pre id="updateResult" class="bg-gray-100 p-2 mt-4 rounded text-sm"></pre>

        <script>
      function updatePost() {
        const id = document.getElementById('postId').value;
        const body = document.getElementById('updateBody').value;

        fetch('https://jsonplaceholder.typicode.com/posts/' + id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: Number(id), title: 'Updated Title', body, userId: 1 })
        })
          .then(response => response.json())
          .then(data => {
            document.getElementById('updateResult').textContent = JSON.stringify(data, null, 2);
          });
      }
    </script>
  </div>
</body>
</html>
