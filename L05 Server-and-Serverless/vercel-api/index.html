<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals API — Vercel Serverless</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen p-8 font-sans">
  <div class="max-w-xl mx-auto space-y-6">
    <h1 class="text-2xl font-bold text-indigo-700">Goals API — Vercel Serverless</h1>

    <!-- Add Goal -->
    <div class="bg-white p-4 rounded shadow space-y-2">
      <h2 class="font-semibold text-gray-700">Add Goal (POST)</h2>
      <input id="newTitle" type="text" placeholder="Goal title"
        class="border p-2 rounded w-full" />
      <button onclick="addGoal()"
        class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Add</button>
    </div>

    <!-- Goals List -->
    <div class="bg-white p-4 rounded shadow">
      <div class="flex justify-between items-center mb-2">
        <h2 class="font-semibold text-gray-700">All Goals (GET)</h2>
        <button onclick="loadGoals()"
          class="text-sm text-indigo-600 hover:underline">Refresh</button>
      </div>
      <ul id="goalList" class="space-y-2 text-sm text-gray-800"></ul>
    </div>

    <!-- Response output -->
    <pre id="output" class="bg-gray-100 p-3 rounded text-xs text-gray-700 whitespace-pre-wrap"></pre>
  </div>

  <script>
    const API = '/api/goals';

    async function loadGoals() {
      const res = await fetch(API);
      const goals = await res.json();
      const list = document.getElementById('goalList');
      list.innerHTML = goals.map(g => `
        <li class="flex justify-between items-center border-b pb-1">
          <span class="${g.completed ? 'line-through text-gray-400' : ''}">${g.id}. ${g.title}</span>
          <div class="space-x-2">
            <button onclick="toggleGoal(${g.id}, ${!g.completed})"
              class="text-green-600 hover:underline text-xs">Toggle</button>
            <button onclick="deleteGoal(${g.id})"
              class="text-red-600 hover:underline text-xs">Delete</button>
          </div>
        </li>`).join('');
      showOutput(goals);
    }

    async function addGoal() {
      const title = document.getElementById('newTitle').value;
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const data = await res.json();
      showOutput(data);
      document.getElementById('newTitle').value = '';
      loadGoals();
    }

    async function toggleGoal(id, completed) {
      const res = await fetch(API, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, completed })
      });
      const data = await res.json();
      showOutput(data);
      loadGoals();
    }

    async function deleteGoal(id) {
      const res = await fetch(API, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      const data = await res.json();
      showOutput(data);
      loadGoals();
    }

    function showOutput(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    loadGoals();
  </script>
</body>
</html>
