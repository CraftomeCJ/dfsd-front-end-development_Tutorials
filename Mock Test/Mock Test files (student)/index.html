<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyLibrary - Explore Books</title>
  <script defer src="script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Hero Section -->
  <section class="w-full bg-cover bg-center" style="background-image: url('books.jpg')">
    <div class="flex items-center justify-center text-center bg-black/60 py-20 px-6">
      <div>
        <h2 class="text-4xl font-bold text-white mb-4">Discover Your Next Favorite Book</h2>
        <p class="text-lg text-white mb-6">Explore the library's best picks, classics, and new arrivals!</p>
        <a href="#books" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded hover:bg-blue-700">Browse Catalog</a>
      </div>
    </div>
  </section>

  <!-- Catalog -->
  <section id="books" class="max-w-7xl mx-auto py-10 px-4">
    <h3 class="text-2xl font-bold mb-6"> Featured Books</h3>
    <div id="bookContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <!-- Books Cards -->
    </div>
  </section>


</body>
</html>
